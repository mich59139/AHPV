
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Articles - Lecture CSV</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Liste des articles</h1>

  <input type="text" id="search" placeholder="Rechercher...">
  <button onclick="toggleForm()">➕ Ajouter un article</button>

  <div id="add-form" style="display:none;">
    <h2>Nouvel article</h2>
    <form id="form-article">
      <input name="Année" placeholder="Année" required />
      <input name="Numéro" placeholder="Numéro" required />
      <input name="Titre" placeholder="Titre" required />
      <input name="Page(s)" placeholder="Page(s)" />
      <input name="Auteur(s)" placeholder="Auteur(s)" />
      <input name="Ville(s)" placeholder="Ville(s)" />
      <input name="Theme(s)" placeholder="Thème(s)" />
      <input name="Epoque" placeholder="Époque" />
      <button type="submit">Préparer pour ajout</button>
    </form>
    <pre id="preview"></pre>
  </div>

  <div id="articles"></div>
  <script src="app.js"></script>
</body>
</html>
