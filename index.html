<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catalogue des articles</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <header class="app-header">
    <h1>Catalogue des articles</h1>
    <div class="controls">
      <input id="search" type="search" placeholder="Rechercher titre, auteur, thème…" />
      <select id="limit">
        <option value="50">50</option>
        <option value="100">100</option>
        <option value="all" selected>Tous</option>
      </select>
      <button id="addBtn" class="btn primary">＋ Ajouter un article</button>
    </div>
  </header>

  <main class="container">
    <div id="table-container"></div>
    <div id="pagination" class="pagination"></div>
  </main>

  <!-- Drawer -->
  <aside id="drawer" class="drawer">
    <div class="drawer-header">
      <h2 id="drawerTitle">Nouvel article</h2>
      <button id="closeDrawer" class="btn ghost">✕</button>
    </div>
    <form id="articleForm" class="form">
      <div class="grid">
        <label>Année<input name="Année" required list="anneesList"/></label>
        <label>Numéro<input name="Numéro" required list="numerosList"/></label>
        <label>Titre<input name="Titre" required /></label>
        <label>Page(s)<input name="Page(s)" /></label>
        <label>Auteur(s)<input name="Auteur(s)" list="auteursList"/></label>
        <label>Ville(s)<input name="Ville(s)" list="villesList"/></label>
        <label>Theme(s)<input name="Theme(s)" list="themesList"/></label>
        <label>Epoque<input name="Epoque" list="epoquesList"/></label>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn primary">Préparer</button>
        <button type="button" id="copyBtn" class="btn">Copier CSV</button>
      </div>
      <pre id="preview" class="preview"></pre>
    </form>
    <datalist id="anneesList"></datalist>
    <datalist id="numerosList"></datalist>
    <datalist id="auteursList"></datalist>
    <datalist id="villesList"></datalist>
    <datalist id="themesList"></datalist>
    <datalist id="epoquesList"></datalist>
  </aside>

  <script src="app.js" defer></script>
</body>
</html>
