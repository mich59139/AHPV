<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Catalogue des articles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Catalogue des articles</h1>

  <div id="toolbar" style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin:10px 0;">
    <label>Année :
      <select id="filter-annee">
        <option value="">(toutes)</option>
      </select>
    </label>

    <label>Numéro :
      <select id="filter-numero">
        <option value="">(tous)</option>
      </select>
    </label>

    <label>Afficher :
      <select id="limit">
        <option value="50" selected>50</option>
        <option value="100">100</option>
        <option value="all">Tous</option>
      </select>
    </label>

    <input type="text" id="search" placeholder="Rechercher…">

    <button id="toggle-add">➕ Ajouter un article</button>
  </div>

  <!-- Drawer d’ajout -->
  <div id="form-container" class="drawer">
    <div class="drawer-content">
      <button id="close-drawer" title="Fermer">✖</button>
      <h2>Nouvel article</h2>
      <form id="form-article">
        <input name="Année"  placeholder="Année" required />
        <input name="Numéro" placeholder="Numéro" required />
        <input name="Titre"  placeholder="Titre" required />
        <input name="Page(s)" placeholder="Page(s)" />
        <input name="Auteur(s)" placeholder="Auteur(s)" />
        <input name="Ville(s)"  placeholder="Ville(s)" />
        <input name="Theme(s)" placeholder="Thème(s)" />
        <input name="Epoque"   placeholder="Période (Epoque)" />
        <button type="submit">Ajouter au lot</button>
      </form>

      <div style="margin:8px 0;">
        <button id="download-batch">Télécharger le lot (.csv)</button>
        <button id="copy-batch">Copier le lot</button>
        <button id="reset-batch">Vider le lot</button>
        <span id="batch-count" style="margin-left:8px;opacity:.7;">0 en attente</span>
      </div>
      <pre id="batch-preview" style="white-space:pre-wrap;"></pre>
    </div>
  </div>

  <div id="articles"></div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
