<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Catalogue des articles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <header class="toolbar">
    <h1>Catalogue des articles</h1>
    <div class="controls">
      <input id="search" type="search" placeholder="Rechercher titre, auteur, thème…">
      <label for="limit">Afficher</label>
      <select id="limit">
        <option value="50">50</option>
        <option value="100">100</option>
        <option value="all" selected>Tous</option>
      </select>
    </div>
  </header>

  <main>
    <div id="table-view"></div>
    <div id="pager"></div>
  </main>

  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <strong>Nouvel article</strong>
      <button id="closeDrawer">✖</button>
    </div>
    <form id="addForm" class="formgrid">
      <input name="Année" placeholder="Année">
      <input name="Numéro" placeholder="Numéro">
      <input name="Titre" placeholder="Titre" required>
      <input name="Page(s)" placeholder="Page(s)">
      <input name="Auteur(s)" placeholder="Auteur(s)">
      <input name="Ville(s)" placeholder="Ville(s)">
      <input name="Theme(s)" placeholder="Thème(s)">
      <input name="Epoque" placeholder="Époque">
      <div class="actions">
        <button type="submit">Préparer</button>
        <button type="button" id="copyBtn">Copier CSV</button>
      </div>
      <pre id="preview"></pre>
    </form>
  </aside>

  <button id="openDrawer" class="fab">+ Ajouter un article</button>

  <script src="app.js" defer></script>
</body>
</html>
