
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Articles</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <h1>Catalogue des articles</h1>

  <input type="text" id="search" placeholder="Rechercher..." />

  <div>
    <button onclick="showTable()">Tableau</button>
    <button onclick="showCards()">Cartes</button>
  </div>

  <div id="table-view"></div>
  <div id="card-view" style="display: none;"></div>

  <h2>Ajouter un article</h2>
  <form id="add-form">
    <input name="Année" placeholder="Année" required />
    <input name="Numéro" placeholder="Numéro" required />
    <input name="Titre" placeholder="Titre" required />
    <input name="Page(s)" placeholder="Page(s)" />
    <input name="Auteur(s)" placeholder="Auteur(s)" />
    <input name="Ville(s)" placeholder="Ville(s)" />
    <input name="Theme(s)" placeholder="Theme(s)" />
    <input name="Epoque" placeholder="Epoque" />
    <button type="submit">Préparer</button>
  </form>
  <pre id="preview"></pre>

  <script src="app.js"></script>
</body>
</html>
