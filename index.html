<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catalogue des articles</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="toolbar">
    <h1>Catalogue des articles</h1>
    <div class="controls">
      <input id="search" type="text" placeholder="Rechercher titre, auteur, thème..." />
      <label class="limit">
        <select id="limit">
          <option value="all">Tous</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </label>
      <button id="toggle-form">➕ Ajouter un article</button>
    </div>
    <div id="count" class="count"></div>
  </header>

  <section id="form-container" class="drawer hidden">
    <div class="drawer-inner">
      <div class="drawer-header">
        <strong>Nouvel article</strong>
        <button id="close-form" title="Fermer">✕</button>
      </div>
      <form id="form-article" class="form-grid">
        <input name="Année" placeholder="Année" required />
        <input name="Numéro" placeholder="Numéro" required />
        <input name="Titre" placeholder="Titre" required />
        <input name="Page(s)" placeholder="Page(s)" />
        <input name="Auteur(s)" placeholder="Auteur(s)" list="dl-auteurs" />
        <input name="Ville(s)" placeholder="Ville(s)" list="dl-villes" />
        <input name="Theme(s)" placeholder="Thème(s)" list="dl-themes" />
        <input name="Epoque" placeholder="Période (Epoque)" list="dl-epoques" />
        <button type="submit">Ajouter au lot</button>
      </form>
      <datalist id="dl-auteurs"></datalist>
      <datalist id="dl-villes"></datalist>
      <datalist id="dl-themes"></datalist>
      <datalist id="dl-epoques"></datalist>

      <div class="batch-actions">
        <button id="download-batch">Télécharger le lot (.csv)</button>
        <button id="copy-batch">Copier le lot</button>
        <button id="reset-batch">Vider le lot</button>
        <span id="batch-count">0 en attente</span>
      </div>
      <pre id="batch-preview"></pre>
    </div>
  </section>

  <main id="articles"></main>

  <script src="app.js"></script>
</body>
</html>
